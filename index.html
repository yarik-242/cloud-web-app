<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reactive Cloud App | Security Test</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; margin-bottom: 30px; }
        h2 { color: #1e293b; margin: 0 0 1rem; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; outline: none; }
        .send-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        #feed { width: 100%; max-width: 400px; }
        .user-post { background: white; padding: 15px 20px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); animation: fadeIn 0.3s ease; }
        .user-info strong { display: block; color: #1e293b; font-size: 1.1rem; }
        .user-info span { color: #64748b; font-size: 0.85rem; }
        
        .like-container { display: flex; align-items: center; gap: 8px; }
        .like-count { font-weight: bold; color: #1e293b; font-size: 1.1rem; }
        .heart-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; padding: 0; }
        .heart-btn:hover { transform: scale(1.2); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Cloud App 🚀</h2>
    <input type="text" id="userName" placeholder="Имя Фамилия" required>
    <input type="email" id="userEmail" placeholder="email@turan.kz" required>
    <button class="send-btn" id="sendBtn">Опубликовать</button>
</div>

<div id="feed"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, 
        query, orderBy, doc, updateDoc, increment, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCw3ttPKMx-jAd1IL-5IZRdA4KVAMYdSgA",
        authDomain: "projctick.firebaseapp.com",
        projectId: "projctick",
        storageBucket: "projctick.firebasestorage.app",
        messagingSenderId: "639615889635",
        appId: "1:639615889635:web:f591a1ebf29ae95e75d5d6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db; // Обязательно для твоего теста на защиту!

    // 1. ОТПРАВКА ДАННЫХ
    document.getElementById('sendBtn').onclick = async () => {
        const name = document.getElementById('userName').value;
        const email = document.getElementById('userEmail').value;
        if(!name || !email) return;

        try {
            await addDoc(collection(db, "requests"), {
                name: name,
                email: email,
                likes: 0,
                timestamp: serverTimestamp() // Требование задания
            });
            document.getElementById('userName').value = "";
            document.getElementById('userEmail').value = "";
        } catch (e) {
            console.error("Ошибка при добавлении:", e);
        }
    };

    // 2. РЕАКТИВНАЯ ЛЕНТА (onSnapshot + orderBy)
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = ""; 
        
        snapshot.forEach((sDoc) => {
            const data = sDoc.data();
            const id = sDoc.id;

            const post = document.createElement('div');
            post.className = 'user-post';
            post.innerHTML = `
                <div class="user-info">
                    <strong>${data.name}</strong>
                    <span>${data.email}</span>
                </div>
                <div class="like-container">
                    <span class="like-count">${data.likes || 0}</span>
                    <button class="heart-btn" id="btn-${id}">❤️</button>
                </div>
            `;
            feed.appendChild(post);

            // Клик по сердечку (Методы updateDoc и increment)
            document.getElementById(`btn-${id}`).onclick = async (e) => {
                e.preventDefault();
                const docRef = doc(db, "requests", id);
                try {
                    await updateDoc(docRef, { 
                        likes: increment(1) 
                    });
                } catch (err) {
                    console.error("Ошибка лайка (возможно, правила безопасности):", err);
                }
            };
        });
    });
</script>

</body>
</html>
